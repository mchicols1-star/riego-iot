<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>NVR Web 16 Cámaras</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body {
    margin: 0;
    background: #000;
    font-family: Arial;
}

.header {
    color: white;
    text-align: center;
    padding: 10px;
    background: #111;
}

.grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 4px;
    height: calc(100vh - 40px);
}

video {
    width: 100%;
    height: 100%;
    background: black;
}
</style>
</head>

<body>

<div class="header">🔴 NVR WEB - 16 CÁMARAS EN VIVO</div>

<div class="grid">
<video id="camara1" autoplay muted></video>
<video id="c2" autoplay muted></video>
<video id="c3" autoplay muted></video>
<video id="c4" autoplay muted></video>

<video id="c5" autoplay muted></video>
<video id="c6" autoplay muted></video>
<video id="c7" autoplay muted></video>
<video id="c8" autoplay muted></video>

<video id="c9" autoplay muted></video>
<video id="c10" autoplay muted></video>
<video id="c11" autoplay muted></video>
<video id="c12" autoplay muted></video>

<video id="c13" autoplay muted></video>
<video id="c14" autoplay muted></video>
<video id="c15" autoplay muted></video>
<video id="c16" autoplay muted></video>
</div>

<script>
const streams = [
"http://localhost:8888/cam1/index.m3u8",
"http://localhost:8888/cam2/index.m3u8",
"http://localhost:8888/cam3/index.m3u8",
"http://localhost:8888/cam4/index.m3u8",
"http://localhost:8888/cam5/index.m3u8",
"http://localhost:8888/cam6/index.m3u8",
"http://localhost:8888/cam7/index.m3u8",
"http://localhost:8888/cam8/index.m3u8",
"http://localhost:8888/cam9/index.m3u8",
"http://localhost:8888/cam10/index.m3u8",
"http://localhost:8888/cam11/index.m3u8",
"http://localhost:8888/cam12/index.m3u8",
"http://localhost:8888/cam13/index.m3u8",
"http://localhost:8888/cam14/index.m3u8",
"http://localhost:8888/cam15/index.m3u8",
"http://localhost:8888/cam16/index.m3u8"
];

function load(video, url){
    if(Hls.isSupported()){
        const hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    } else {
        video.src = url;
    }
}

for(let i=0;i<16;i++){
    load(document.getElementById("c"+(i+1)), streams[i]);
}
</script>

</body>
</html>
