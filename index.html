<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>🌱 Sistema IoT de Riego</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Sistema Inteligente de Riego</h1>

    <div class="card">
        <h2>Humedad Actual</h2>
        <h1 id="humedad">0%</h1>
    </div>

    <div class="card">
        <h2>Estado</h2>
        <h3 id="estado">Cargando...</h3>
    </div>

    <div class="card">
        <h2>Bomba</h2>
        <h3 id="bomba">Apagada</h3>
    </div>




    
      <div class="card">

    <h2>Control de Bomba</h2>

    <button class="btn-on"
        onclick="controlBomba('ON')">
        🚰 Encender
    </button>

    <button class="btn-off"
        onclick="controlBomba('OFF')">
        ⛔ Apagar
    </button>

</div>



    
    
    <h2>Dashboard de Monitoreo</h2>
    

    <iframe
        width="100%"
        height="800"
        src="https://datastudio.google.com/embed/reporting/f621a10d-f9c2-41d7-b72b-84a5aa0d2f2c/page/DCT0F"
        frameborder="0"
        style="border:0"
        allowfullscreen>
    </iframe>

    <h2>Predicción Humedad</h2>

    <iframe 
        width="450" 
        height="260" 
        style="border: 1px solid #cccccc;" 
        src="https://thingspeak.com/channels/3399676/charts/2?bgcolor=%23ffffff&color=%23d62020&dynamic=true&results=60&title=Predicci%C3%B3n&type=line">
    </iframe>
    



    <script>

function controlBomba(estado){

    fetch(
        "https://script.google.com/macros/s/AKfycbyE3aa3ZMz9z5rLawjQ5FXPWLffYI2-c8H79oNcSBNzK5iJlWLRoR0EXCDchnDwPgRGGw/exec?control=" + estado
    )
    .then(response => response.text())
    .then(data => {

        alert(data);

    });

}

</script>




    
    <script src="script.js"></script>



    
   


    

</body>
</html>
